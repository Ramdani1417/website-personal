<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet"href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
</head>

    <style>
        body{
            text-align: center;
            background-color: rgb(131, 25, 25);
            h1{
                color :rgb(0, 0, 0)
            }
            h2{
                color :rgb(101, 194, 248)
            }
            h3{
                color :rgb(243, 5, 5)
            }
           
        }

         .foto-container{
            display: flex; /*membuat kedua foto menjadi sejajar*/
            justify-content: center; /*mengatur barisan foto*/
            align-items: flex-start;
            gap: 40px; /* jarak antar foto */
            margin-top: 20px;
        }
         .foto-container img{
           height: 250px; /* samakan tinggi*/
           width: 300px;  /*samakan lebar*/
           object-fit: cover; /*membuat gambar terisi penuh*/
           border: 10px dashed navy;
        
        }
       

    </style>

<body>
    <h1>Portofolio saya</h1>
     <h2> Nama : Ramdani</h2>
     <h2> Sekolah : SMKN 2 Jakarta</h2>
     <h3> umur : 18</h3>
     <h3> hobby : berenang</h3>
     <h3> makanan favorit : ayam</h3>
     <h3> minuman favorit : air es</h3>

<div class="foto-container">

    <div class="foto-item">
        <p>Foto profil</p>
        <img src="gambar/teh hijau.jpeg">
     </div>

     <div class="foto-item">
        <p>Musik favorit</p>
         <img src="gambar/selera musik.jpeg">
     </div>
     
</div>
    
       
</body>
</html>
